<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes scanline {
        0%   { transform: translateY(-60px); }
        100% { transform: translateY(280px); }
      }
      @keyframes glitch {
        0%,89%,100% { transform: translate(0,0); opacity:1; }
        90%          { transform: translate(-4px, 1px); opacity:0.85; clip-path: polygon(0 15%, 100% 15%, 100% 30%, 0 30%); }
        92%          { transform: translate(4px, -1px); opacity:0.9;  clip-path: polygon(0 55%, 100% 55%, 100% 68%, 0 68%); }
        94%          { transform: translate(-2px, 2px); opacity:0.8;  clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); }
        96%          { transform: translate(0,0); opacity:1; clip-path: none; }
      }
      @keyframes glitch2 {
        0%,91%,100% { opacity:0; }
        91.5%       { opacity:0.4; transform: translate(5px,0); clip-path: polygon(0 25%, 100% 25%, 100% 40%, 0 40%); }
        93%         { opacity:0.3; transform: translate(-5px,0); clip-path: polygon(0 65%, 100% 65%, 100% 80%, 0 80%); }
        95%         { opacity:0; }
      }
      @keyframes pulse {
        0%,100% { opacity:0.25; }
        50%     { opacity:0.9; }
      }
      @keyframes blink {
        0%,49%  { opacity:1; }
        50%,100% { opacity:0; }
      }
      @keyframes flicker {
        0%,97%,100% { opacity:1; }
        97.5%       { opacity:0.6; }
        98.5%       { opacity:1; }
        99%         { opacity:0.75; }
      }
      @keyframes fadeSlide {
        from { opacity:0; transform:translateY(8px); }
        to   { opacity:1; transform:translateY(0); }
      }
      @keyframes drawH {
        from { stroke-dashoffset: 900; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes rotateDot {
        from { transform: rotate(0deg) translateX(18px); }
        to   { transform: rotate(360deg) translateX(18px); }
      }
      @keyframes jpFloat {
        0%,100% { opacity:0.18; transform:translateY(0); }
        50%     { opacity:0.35; transform:translateY(-6px); }
      }

      .title       { animation: glitch 5s ease-in-out infinite, flicker 7s infinite; }
      .title-ghost { animation: glitch2 5s ease-in-out infinite; }
      .scanline    { animation: scanline 2.8s linear infinite; }
      .p1  { animation: pulse 2.1s ease-in-out infinite; animation-delay:0s; }
      .p2  { animation: pulse 2.5s ease-in-out infinite; animation-delay:0.4s; }
      .p3  { animation: pulse 1.9s ease-in-out infinite; animation-delay:0.8s; }
      .p4  { animation: pulse 2.8s ease-in-out infinite; animation-delay:1.2s; }
      .p5  { animation: pulse 2.2s ease-in-out infinite; animation-delay:0.6s; }
      .p6  { animation: pulse 3.0s ease-in-out infinite; animation-delay:1.6s; }
      .p7  { animation: pulse 2.4s ease-in-out infinite; animation-delay:0.2s; }
      .cursor   { animation: blink 1s step-end infinite; }
      .sub1     { animation: fadeSlide 0.8s ease-out 0.3s both; }
      .sub2     { animation: fadeSlide 0.8s ease-out 0.7s both; }
      .sub3     { animation: fadeSlide 0.8s ease-out 1.1s both; }
      .hline    { stroke-dasharray: 900; animation: drawH 1.5s ease-out 0.2s both; }
      .jp1      { animation: jpFloat 4s ease-in-out infinite; animation-delay:0s; }
      .jp2      { animation: jpFloat 5s ease-in-out infinite; animation-delay:1s; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#05050d"/>
      <stop offset="100%" stop-color="#0c0c1e"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="50%"  stop-color="#5555bb" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="hlineFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="15%"  stop-color="#3535aa"/>
      <stop offset="85%"  stop-color="#3535aa"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip"><rect width="900" height="280"/></clipPath>
  </defs>

  <!-- BG -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.045" stroke="#5555cc" stroke-width="0.5">
    <line x1="150" y1="0"   x2="150" y2="280"/>
    <line x1="300" y1="0"   x2="300" y2="280"/>
    <line x1="450" y1="0"   x2="450" y2="280"/>
    <line x1="600" y1="0"   x2="600" y2="280"/>
    <line x1="750" y1="0"   x2="750" y2="280"/>
    <line x1="0"   y1="70"  x2="900" y2="70"/>
    <line x1="0"   y1="140" x2="900" y2="140"/>
    <line x1="0"   y1="210" x2="900" y2="210"/>
  </g>

  <!-- Scanline -->
  <g clip-path="url(#clip)">
    <rect class="scanline" width="900" height="60" fill="url(#scanGrad)"/>
  </g>

  <!-- Horizontal accent lines -->
  <line class="hline" x1="0" y1="55"  x2="900" y2="55"  stroke="url(#hlineFade)" stroke-width="0.6"/>
  <line class="hline" x1="0" y1="225" x2="900" y2="225" stroke="url(#hlineFade)" stroke-width="0.6"/>

  <!-- Corner brackets -->
  <g stroke="#4a4aaa" stroke-width="1.2" fill="none" opacity="0.7">
    <polyline points="18,18 18,52 52,52"/>
    <polyline points="882,18 882,52 848,52"/>
    <polyline points="18,262 18,228 52,228"/>
    <polyline points="882,262 882,228 848,228"/>
  </g>
  <!-- Corner dots -->
  <circle cx="18" cy="18" r="2" fill="#5050cc" opacity="0.8"/>
  <circle cx="882" cy="18" r="2" fill="#5050cc" opacity="0.8"/>
  <circle cx="18" cy="262" r="2" fill="#5050cc" opacity="0.8"/>
  <circle cx="882" cy="262" r="2" fill="#5050cc" opacity="0.8"/>

  <!-- Floating particles -->
  <circle class="p1" cx="75"  cy="95"  r="1.5" fill="#7070ff"/>
  <circle class="p2" cx="825" cy="75"  r="1"   fill="#9090ff"/>
  <circle class="p3" cx="130" cy="195" r="1.2" fill="#6060ee"/>
  <circle class="p4" cx="770" cy="185" r="1.5" fill="#8080ff"/>
  <circle class="p5" cx="42"  cy="155" r="1"   fill="#5555dd"/>
  <circle class="p6" cx="858" cy="210" r="1.2" fill="#7070ee"/>
  <circle class="p7" cx="450" cy="30"  r="1"   fill="#6666cc"/>

  <!-- Japanese vertical text left -->
  <text class="jp1" x="28" y="200" fill="#3a3a99" font-family="serif" font-size="12" writing-mode="tb" letter-spacing="4">開発者</text>

  <!-- Japanese vertical text right -->
  <text class="jp2" x="862" y="220" fill="#3a3a99" font-family="serif" font-size="11" writing-mode="tb" letter-spacing="3">未来を構築する</text>

  <!-- Main title glow layer -->
  <text x="450" y="138" text-anchor="middle"
        fill="#8888ff" font-family="'Courier New', Courier, monospace"
        font-size="46" font-weight="bold" letter-spacing="5"
        filter="url(#glow)" opacity="0.4">✦ ニキータ.dev</text>

  <!-- Main title -->
  <text class="title" x="450" y="138" text-anchor="middle"
        fill="#d0d0ff" font-family="'Courier New', Courier, monospace"
        font-size="46" font-weight="bold" letter-spacing="5">✦ ニキータ.dev</text>

  <!-- Glitch ghost -->
  <text class="title-ghost" x="450" y="138" text-anchor="middle"
        fill="#ff5577" font-family="'Courier New', Courier, monospace"
        font-size="46" font-weight="bold" letter-spacing="5">✦ ニキータ.dev</text>

  <!-- Subtitle -->
  <text class="sub1" x="450" y="168" text-anchor="middle"
        fill="#555599" font-family="'Courier New', Courier, monospace"
        font-size="12" letter-spacing="7">3D FRONTEND · THREE.JS · WEBGL · GO</text>

  <!-- Divider dots -->
  <g class="sub2" fill="#3a3a88" opacity="0.9">
    <rect x="200" y="180" width="20" height="0.6"/>
    <rect x="390" y="180" width="120" height="0.6" fill="#5555aa"/>
    <rect x="680" y="180" width="20" height="0.6"/>
  </g>

  <!-- Terminal line -->
  <text class="sub3" x="450" y="208" text-anchor="middle"
        fill="#2e2e6e" font-family="'Courier New', Courier, monospace" font-size="10.5" letter-spacing="1">
    <tspan fill="#3a3a7a">~/nikita.dev</tspan>
    <tspan fill="#222255"> $ </tspan>
    <tspan fill="#4a4a99">building immersive web experiences</tspan>
    <tspan class="cursor" fill="#7070cc">▌</tspan>
  </text>

  <!-- Bottom tagline -->
  <text class="sub3" x="450" y="248" text-anchor="middle"
        fill="#1e1e44" font-family="'Courier New', Courier, monospace"
        font-size="9" letter-spacing="5">ALMATY · KAZAKHSTAN</text>
</svg>
